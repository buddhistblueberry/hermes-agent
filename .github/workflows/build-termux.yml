name: Build for Termux (Android)

on:
  workflow_dispatch:
    inputs:
      extras:
        description: Pip extras to install
        required: true
        default: termux
        type: choice
        options:
          - termux
          - termux-all
          - ""
  push:
    branches: [main]
    paths:
      - pyproject.toml
      - constraints-termux.txt
      - .github/workflows/build-termux.yml
  release:
    types: [published]

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-termux:
    name: Build Hermes for Termux
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang pkg-config libffi-dev libssl-dev make rustc cargo

      - name: Build wheel
        env:
          ANDROID_API_LEVEL: "35"
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m build --wheel

      - name: Install and verify
        env:
          ANDROID_API_LEVEL: "35"
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          EXTRAS="${{ github.event.inputs.extras || 'termux' }}"
          if [ -n "$EXTRAS" ]; then
            python -m pip install "$WHEEL[$EXTRAS]" -c constraints-termux.txt
          else
            python -m pip install "$WHEEL" -c constraints-termux.txt
          fi
          hermes version
          hermes doctor || true

      - name: Package artifact
        run: |
          mkdir -p hermes-termux
          cp dist/*.whl hermes-termux/
          cp constraints-termux.txt hermes-termux/ 2>/dev/null || true
          echo "Hermes Agent Termux Build" > hermes-termux/README.txt
          tar czf hermes-termux-build.tar.gz hermes-termux/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-termux-build
          path: |
            dist/*.whl
            hermes-termux-build.tar.gz
          retention-days: 30
